<!DOCTYPE html>

<html class="light" lang="es-MX"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Nexa - ¡Tu mesa está lista!</title>
<!-- Fonts -->

                    "on-background": "#1e1b19",
                    "on-secondary-container": "#006f66",
                    "inverse-primary": "#ffb4a5",
                    "tertiary": "#655d58",
                    "secondary-fixed": "#94f3e7",
                    "on-primary-container": "#670f02",
                    "on-secondary-fixed": "#00201d",
                    "primary": "#a43c27",
                    "on-tertiary-fixed": "#201a17",
                    "inverse-surface": "#34302d",
                    "on-surface": "#1e1b19",
                    "surface-container": "#f5ece9",
                    "inverse-on-surface": "#f8efeb",
                    "tertiary-fixed": "#ece0da",
                    "on-secondary": "#ffffff",
                    "outline": "#8a716c",
                    "on-error": "#ffffff",
                    "surface": "#fff8f5",
                    "surface-bright": "#fff8f5",
                    "on-primary-fixed": "#3e0400",
                    "secondary-fixed-dim": "#77d7cb",
                    "surface-container-highest": "#e9e1dd",
                    "on-error-container": "#93000a",
                    "primary-fixed-dim": "#ffb4a5",
                    "on-primary": "#ffffff",
                    "surface-container-high": "#efe6e3",
                    "surface-variant": "#e9e1dd",
                    "on-secondary-fixed-variant": "#00504a",
                    "background": "#fff8f5",
                    "tertiary-container": "#a29893",
                    "surface-dim": "#e1d8d5",
                    "on-primary-fixed-variant": "#842413",
                    "surface-container-low": "#fbf2ee",
                    "secondary": "#006a62",
                    "primary-container": "#f2755c",
                    "surface-container-lowest": "#ffffff",

                    "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "600"}]

          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fff8f5; /* surface */
            -webkit-tap-highlight-color: transparent;
        }
        .celebration-float {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .sparkle-pop {
            animation: pop 2s ease-in-out infinite;
        }
        @keyframes pop {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface antialiased">
<!-- Top Navigation Shell (Hidden as per Contextual Suppression for Transactional/Success screen) -->
<header class="flex justify-between items-center px-margin-mobile h-16 w-full bg-surface">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-headline-md">restaurant</span>
<span class="font-headline-md text-headline-md font-bold text-primary">Nexa</span>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</header>
<main class="min-h-[calc(100vh-64px)] flex flex-col items-center justify-center px-margin-mobile pb-12 overflow-x-hidden">
<!-- Hero Section -->
<div class="relative w-full max-w-xs aspect-square mb-lg flex items-center justify-center">
<!-- Background Soft Glow -->
<div class="absolute inset-0 bg-primary-container/10 rounded-full blur-3xl"></div>
<!-- Animated Celebration Content -->
<div class="relative z-10 celebration-float">
<div class="w-64 h-64 rounded-[40px] overflow-hidden shadow-[0px_10px_30px_rgba(46,42,40,0.04)] bg-surface-container-lowest flex items-center justify-center">
<div class="absolute top-4 right-4 sparkle-pop" style="animation-delay: 0.5s">
<span class="material-symbols-outlined text-secondary-container text-4xl" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<div class="absolute bottom-6 left-6 sparkle-pop" style="animation-delay: 1.2s">
<span class="material-symbols-outlined text-primary-container text-3xl" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<div class="flex flex-col items-center gap-4">
<div class="w-32 h-32 rounded-full bg-secondary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-6xl" style="font-variation-settings: 'FILL' 1;">table_restaurant</span>
</div>
<div class="px-4 py-2 bg-primary-container/10 rounded-full border border-primary-container/20">
<p class="font-label-md text-on-primary-container">Mesa para 4 disponible</p>
</div>
</div>
</div>
</div>
<!-- Floating Elements -->
<span class="absolute top-0 left-0 material-symbols-outlined text-primary-container/40 text-2xl sparkle-pop">star</span>
<span class="absolute bottom-10 right-0 material-symbols-outlined text-secondary/40 text-2xl sparkle-pop" style="animation-delay: 0.8s">celebration</span>
</div>
<!-- Main Messaging -->
<div class="text-center space-y-sm mb-lg">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">¡Tu mesa está lista!</h1>
<p class="font-body-lg text-on-surface-variant max-w-[280px] mx-auto">Acércate a la recepción, te estamos esperando con una sonrisa.</p>
</div>
<!-- Time Notice Card -->
<div class="w-full max-w-sm bg-surface-container-low rounded-[24px] p-md mb-xl flex items-center gap-md border border-outline-variant/30">
<div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined text-on-secondary-container">timer</span>
</div>
<div class="flex flex-col">
<p class="font-label-md text-on-surface">Atención prioritaria</p>
<p class="font-body-md text-on-surface-variant">Tienes <span class="font-bold text-primary">10 minutos</span> para presentarte.</p>
</div>
</div>
<!-- Actions -->
<div class="w-full max-w-sm flex flex-col gap-base">
<button class="w-full h-14 bg-primary-container text-on-primary font-headline-md text-body-lg rounded-full shadow-[0px_10px_30px_rgba(242,117,92,0.2)] active:scale-95 transition-all flex items-center justify-center gap-2">
<span>¡Ya voy!</span>
<span class="material-symbols-outlined">chevron_right</span>
</button>
<button class="w-full h-14 bg-transparent text-on-surface-variant font-label-md hover:bg-surface-container-highest rounded-full transition-all flex items-center justify-center">
                Necesito unos minutos
            </button>
</div>
</main>
<!-- Bottom Navigation Shell (Suppressed for focused celebratory intent) -->
<script>
        // Micro-interaction for the "Ya voy" button
        document.querySelector('button.bg-primary-container').addEventListener('click', function() {
            this.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Confirmando...';
            setTimeout(() => {
                this.classList.remove('bg-primary-container');
                this.classList.add('bg-secondary');
                this.innerHTML = '<span class="material-symbols-outlined">check_circle</span> ¡Excelente!';
            }, 800);
        });

        // Background subtle sparkle interaction
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.95) {
                const sparkle = document.createElement('div');
                sparkle.className = 'fixed pointer-events-none material-symbols-outlined text-primary-container opacity-0';
                sparkle.style.left = e.clientX + 'px';
                sparkle.style.top = e.clientY + 'px';
                sparkle.innerText = 'auto_awesome';
                sparkle.style.fontSize = Math.random() * 20 + 10 + 'px';
                document.body.appendChild(sparkle);

                sparkle.animate([
                    { transform: 'translateY(0) scale(0)', opacity: 0 },
                    { transform: 'translateY(-20px) scale(1)', opacity: 0.6, offset: 0.5 },
                    { transform: 'translateY(-40px) scale(0)', opacity: 0 }
                ], {
                    duration: 1000,
                    easing: 'ease-out'
                }).onfinish = () => sparkle.remove();
            }
        });
    </script>
</body></html>
