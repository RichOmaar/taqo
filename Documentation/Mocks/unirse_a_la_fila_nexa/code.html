<body class="bg-background text-on-background font-body-md text-body-md min-h-screen flex flex-col items-center">

<header class="flex justify-between items-center px-margin-mobile h-16 w-full fixed top-0 bg-surface z-50">
<div class="flex items-center gap-base">
<span class="material-symbols-outlined text-primary" data-icon="restaurant">restaurant</span>

</div>
<button class="hover:bg-surface-container-low transition-colors active:scale-95 duration-200 p-2 rounded-full">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="account_circle">account_circle</span>
</button>
</header>
<main class="w-full max-w-lg mt-16 px-margin-mobile flex-1 pb-32">
<!-- Header Section -->
<section class="flex flex-col items-center text-center mt-md mb-lg">
<div class="w-20 h-20 rounded-full shadow-soft mb-md border-4 border-white overflow-hidden bg-white">
<img class="w-full h-full object-cover" data-alt="A warm, inviting close-up of a traditional Mexican restaurant logo for 'El Sazón de la Abuela'. The image should feature rustic textures like terracotta and hand-painted ceramics, with a soft blur on traditional décor in the background. The lighting is golden and high-key, reflecting a welcoming home-style hospitality vibe, dominated by warm earth tones and soft whites." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBkn5BAssJSyBYmQXfDp6OULSuEVh5ntDYZHIySE_TD67ZOSjNuPmaxH0230zXmKG59zGyPSkTBqBKnmCmShSwOA9gkEWQs3_Brd8y97_CuS9TBJ3sSA8u5TL7mJnmWUNX7X22fvzs9OxAtJlxfUwmTSb64A3N654h5eO3vZbE6lFwP3e9rLB-ADj2sJXLjibO0yTZkvRtrgbokLx_WAvqxj0SIrinzEi5exER-2Z9Fr0c1n_CHskqw6EyPdVL_TWczL6Sm2EwOGbQ"/>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs">¡Te damos la bienvenida!</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Estamos felices de recibirte en El Sazón de la Abuela.</p>
</section>
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-3xl p-md shadow-soft space-y-lg">
<!-- Field 1: Name -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="user-name">Tu nombre</label>
<input class="w-full h-14 px-md bg-surface-container-low rounded-2xl border-none focus:ring-2 focus:ring-secondary transition-all placeholder:text-outline-variant font-body-md text-body-md" id="user-name" placeholder="Usa un apodo divertido si prefieres" type="text"/>
</div>
<!-- Field 2: Party Size -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">¿Cuántos vienen contigo?</label>
<div class="flex items-center justify-between bg-surface-container-low rounded-2xl p-sm">
<button class="w-12 h-12 flex items-center justify-center bg-white rounded-full text-primary shadow-sm active:scale-90 transition-transform" id="party-minus">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<span class="font-headline-md text-headline-md text-on-surface" id="party-count">2</span>
<button class="w-12 h-12 flex items-center justify-center bg-white rounded-full text-primary shadow-sm active:scale-90 transition-transform" id="party-plus">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>
<!-- Field 3: Phone -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="user-phone">Tu teléfono (opcional)</label>
<input class="w-full h-14 px-md bg-surface-container-low rounded-2xl border-none focus:ring-2 focus:ring-secondary transition-all placeholder:text-outline-variant font-body-md text-body-md" id="user-phone" placeholder="55 1234 5678" type="tel"/>
<p class="font-label-sm text-label-sm text-on-surface-variant ml-xs mt-xs opacity-80">Solo para avisarte por WhatsApp o SMS cuando tu mesa esté lista.</p>
</div>
<!-- Field 4: Queue Selector -->
<div class="space-y-sm">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs">Tipo de fila</label>
<div class="flex gap-sm overflow-x-auto no-scrollbar pb-xs">
<button class="queue-tab px-md py-sm rounded-full bg-primary-container text-on-primary-container font-label-md text-label-md whitespace-nowrap active:scale-95 transition-all" data-type="general">General</button>
<button class="queue-tab px-md py-sm rounded-full bg-surface-container-high text-on-surface-variant font-label-md text-label-md whitespace-nowrap active:scale-95 transition-all" data-type="vip">VIP</button>
<button class="queue-tab px-md py-sm rounded-full bg-surface-container-high text-on-surface-variant font-label-md text-label-md whitespace-nowrap active:scale-95 transition-all" data-type="visitante">Visitante</button>
</div>
</div>
</div>
<!-- Action Section -->

<button class="w-full h-16 bg-primary-container text-white rounded-full font-headline-md text-headline-md shadow-lg active:scale-[0.98] transition-transform flex items-center justify-center gap-sm">
                Unirme a la fila

<span class="material-symbols-outlined" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-label-md text-label-md">¡Bienvenidos!</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="hourglass_top">hourglass_top</span>
<span class="font-label-md text-label-md">Mi Lugar</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all active:scale-90 duration-150">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-md text-label-md">Ajustes</span>
</div>

<script>
        // Simple party counter logic
        const partyMinus = document.getElementById('party-minus');
        const partyPlus = document.getElementById('party-plus');
        const partyCountDisplay = document.getElementById('party-count');
        let currentPartySize = 2;

        partyMinus.addEventListener('click', () => {
            if (currentPartySize > 1) {
                currentPartySize--;
                partyCountDisplay.innerText = currentPartySize;
            }
        });

        partyPlus.addEventListener('click', () => {
            if (currentPartySize < 20) {
                currentPartySize++;
                partyCountDisplay.innerText = currentPartySize;
            }
        });

        // Queue tab logic
        const tabs = document.querySelectorAll('.queue-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('bg-primary-container', 'text-on-primary-container');
                    t.classList.add('bg-surface-container-high', 'text-on-surface-variant');
                });
                tab.classList.remove('bg-surface-container-high', 'text-on-surface-variant');
                tab.classList.add('bg-primary-container', 'text-on-primary-container');
            });
        });

        // Micro-interaction: button scales
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => btn.classList.add('scale-95'));
            btn.addEventListener('touchend', () => btn.classList.remove('scale-95'));
        });
    </script>
