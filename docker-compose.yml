services:
  postgres:
    image: postgres:16-alpine
    container_name: nexa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexa
      POSTGRES_PASSWORD: nexa
      POSTGRES_DB: nexa
    # Host port 5433 to avoid clashing with a default local Postgres on 5432.
    ports:
      - '5433:5432'
    volumes:
      - nexa-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nexa -d nexa']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nexa-postgres-data:
